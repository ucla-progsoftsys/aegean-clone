---
architecture: req_race_eo.yaml

# K6 configs
duration: 15s
k6_vus: 50

# Nested exact-once dispatch
nested_use_eo: true
req_race_nested_use_eo: true
eo_tick_interval_ms: 10
eo_election_tick: 10
eo_heartbeat_tick: 1

# Run & system configs
run_timeout_seconds: 20
parallel_window_k: 4
worker_count: 4
gomaxprocs: 4
