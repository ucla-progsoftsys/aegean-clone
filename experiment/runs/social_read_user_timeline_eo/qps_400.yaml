---
architecture: social_read_user_timeline.yaml

# k6 config
k6_qps: 400
duration: 15s
k6_pre_allocated_vus: 0
k6_max_vus: 10000

# Social workflow config
social_user_count: 32
social_seed_posts_per_user: 10
social_nested_send_all_replicas: false
social_mixer_mode: no_home_fanout_key

# Nested exact-once dispatch
nested_use_eo: true
social_nested_use_eo: true
eo_tick_interval_ms: 10
eo_election_tick: 10
eo_heartbeat_tick: 1

# Run & system configs
run_timeout_seconds: 25
parallel_window_k: 4
worker_count: 4
gomaxprocs: 4
