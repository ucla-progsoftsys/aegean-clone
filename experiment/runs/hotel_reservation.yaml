---
architecture: hotel_reservation.yaml

# k6 config
duration: 15s
k6_vus: 50

# Hotel /reservation path config
hotel_hotel_count: 80
hotel_user_count: 501
hotel_search_radius_km: 10.0
hotel_search_max_results: 5
hotel_nested_send_all_replicas: false

# Redis durable state config
hotel_redis_enable: true
hotel_redis_addr: 127.0.0.1:6379

# Run & system configs
run_timeout_seconds: 35
parallel_window_k: 8
worker_count: 8
gomaxprocs: 4
