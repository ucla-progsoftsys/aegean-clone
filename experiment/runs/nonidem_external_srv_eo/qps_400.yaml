---
architecture: external_srv_open.yaml

# K6 configs
k6_qps: 400
duration: 15s
k6_pre_allocated_vus: 0
k6_max_vus: 10000

# External srv workflow configs
external_service_mode: side_effect

# Nested exact-once dispatch
nested_use_eo: true
eo_tick_interval_ms: 10
eo_election_tick: 10
eo_heartbeat_tick: 1

# Run & system configs
run_timeout_seconds: 45
parallel_window_k: 4
worker_count: 4
gomaxprocs: 4
