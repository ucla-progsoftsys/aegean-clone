---
services:
  client:
    type: client
    next:
    - node1
    client_workflow: aegean_k6_open_client
  middle:
    type: unreplicated_server
    clients:
    - node0
    nodes:
    - node1
    exec_workflow: aegean_middle
    init_state_workflow: aegean_default
  backend:
    type: unreplicated_server
    clients:
    - node1
    nodes:
    - node4
    exec_workflow: aegean_backend
    init_state_workflow: aegean_default
nodes:
  node0:
    service: client
  node1:
    service: middle
  node4:
    service: backend
