---
services:
  client:
    type: client
    next:
    - node1
    - node2
    - node3
    client_workflow: aegean_k6_closed_client
  middle:
    type: server
    clients:
    - node0
    nodes:
    - node1
    - node2
    - node3
    exec_workflow: aegean_middle
    init_state_workflow: aegean_default
    shimQuorumSize: 1
    verifyResponseQuorumSize: 1
    execVerifyQuorumSize: 2
    phaseQuorumSize: 2
    expectedExecVotes: 3
    batcher_config:
      batch_size: 40
      batch_timeout_ms: 25
  backend:
    type: server
    clients:
    - node1
    - node2
    - node3
    nodes:
    - node4
    - node5
    - node6
    exec_workflow: aegean_backend
    init_state_workflow: aegean_default
    shimQuorumSize: 2
    verifyResponseQuorumSize: 1
    execVerifyQuorumSize: 2
    phaseQuorumSize: 2
    expectedExecVotes: 3
    batcher_config:
      batch_size: 10
      batch_timeout_ms: 5
nodes:
  node0:
    service: client
  node1:
    service: middle
    is_primary_batcher: true
  node2:
    service: middle
    is_primary_batcher: false
  node3:
    service: middle
    is_primary_batcher: false
  node4:
    service: backend
    is_primary_batcher: true
  node5:
    service: backend
    is_primary_batcher: false
  node6:
    service: backend
    is_primary_batcher: false
