# Docker Compose for Aegean local cluster
# Creates 31 "fake" nodes on a single network for testing
# App ports: 9001-9031 (mapped from internal 8000)

networks:
  aegean-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.0.0/24

x-node-common: &node-common
  build:
    context: .
    dockerfile: docker/Dockerfile
  networks:
    - aegean-net
  volumes:
    - .:/app
  extra_hosts:
    - "node0:10.0.0.10"
    - "node1:10.0.0.11"
    - "node2:10.0.0.12"
    - "node3:10.0.0.13"
    - "node4:10.0.0.14"
    - "node5:10.0.0.15"
    - "node6:10.0.0.16"
    - "node7:10.0.0.17"
    - "node8:10.0.0.18"
    - "node9:10.0.0.19"
    - "node10:10.0.0.20"
    - "node11:10.0.0.21"
    - "node12:10.0.0.22"
    - "node13:10.0.0.23"
    - "node14:10.0.0.24"
    - "node15:10.0.0.25"
    - "node16:10.0.0.26"
    - "node17:10.0.0.27"
    - "node18:10.0.0.28"
    - "node19:10.0.0.29"
    - "node20:10.0.0.30"
    - "node21:10.0.0.31"
    - "node22:10.0.0.32"
    - "node23:10.0.0.33"
    - "node24:10.0.0.34"
    - "node25:10.0.0.35"
    - "node26:10.0.0.36"
    - "node27:10.0.0.37"
    - "node28:10.0.0.38"
    - "node29:10.0.0.39"
    - "node30:10.0.0.40"
  restart: unless-stopped

services:
  node0:
    <<: *node-common
    hostname: node0
    ports:
      - "2201:22"
      - "9001:8000"
    networks:
      aegean-net:
        ipv4_address: 10.0.0.10

  node1:
    <<: *node-common
    hostname: node1
    ports:
      - "2202:22"
      - "9002:8000"
    networks:
      aegean-net:
        ipv4_address: 10.0.0.11

