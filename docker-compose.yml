# Docker Compose for Aegean local cluster
# Creates 21 "fake" nodes on a single network for testing
# App ports: 9001-9021 (mapped from internal 8000)

networks:
  aegean-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.0.0/24

x-node-common: &node-common
  build:
    context: .
    dockerfile: docker/Dockerfile
  networks:
    - aegean-net
  volumes:
    - .:/app
  extra_hosts:
    - "node1:10.0.0.10"
    - "node2:10.0.0.11"
    - "node3:10.0.0.12"
    - "node4:10.0.0.13"
    - "node5:10.0.0.14"
    - "node6:10.0.0.15"
    - "node7:10.0.0.16"
    - "node8:10.0.0.17"
    - "node9:10.0.0.18"
    - "node10:10.0.0.19"
    - "node11:10.0.0.20"
    - "node12:10.0.0.21"
    - "node13:10.0.0.22"
    - "node14:10.0.0.23"
    - "node15:10.0.0.24"
    - "node16:10.0.0.25"
    - "node17:10.0.0.26"
    - "node18:10.0.0.27"
    - "node19:10.0.0.28"
    - "node20:10.0.0.29"
    - "node21:10.0.0.30"
  restart: unless-stopped

services:
  node1:
    <<: *node-common
    hostname: node1
    ports:
      - "2201:22"
      - "9001:8000"
    networks:
      aegean-net:
        ipv4_address: 10.0.0.10

  node2:
    <<: *node-common
    hostname: node2
    ports:
      - "2202:22"
      - "9002:8000"
    networks:
      aegean-net:
        ipv4_address: 10.0.0.11

  node3:
